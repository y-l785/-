<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>王熠 · 死对头</title>
<style>
  :root { --bg:#000; --me:#0A84FF; --other:#26252A; --text:#EBEBF5; --sub:rgba(235,235,245,0.6); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body,html { height:100%; background:var(--bg); font-family: -apple-system, sans-serif; font-size:15px; color:var(--text); overflow:hidden; }
  #app { max-width:414px; height:100%; margin:0 auto; display:flex; flex-direction:column; background:var(--bg); }
  .nav { display:flex; justify-content:space-between; padding:16px 16px 0; align-items:center; flex-shrink:0; }
  .nav-center { display:flex; flex-direction:column; align-items:center; }
  .avatar { width:50px; height:50px; border-radius:50%; background:linear-gradient(135deg,#7c7c96,#4b4b6a); display:flex; align-items:center; justify-content:center; }
  .avatar svg { width:30px; height:30px; fill:#e5e5ea; }
  .name-pill { background:#1c1c1e; padding:4px 12px; border-radius:14px; font-size:14px; margin-top:4px; }
  .chat { flex:1; overflow-y:auto; padding:20px 14px 16px; display:flex; flex-direction:column; }
  .message { display:flex; flex-direction:column; margin-bottom:3px; animation:fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .message.me { align-items:flex-end; }
  .message.other { align-items:flex-start; }
  .bubble { max-width:72%; padding:8px 14px; border-radius:20px; word-wrap:break-word; }
  .message.me .bubble { background:var(--me); color:#fff; }
  .message.other .bubble { background:var(--other); color:#fff; }
  .time-tag { font-size:10px; color:var(--sub); margin:2px 6px; }
  .typing { display:none; background:var(--other); padding:4px 16px; border-radius:20px; height:30px; width:60px; margin-top:6px; }
  .typing.show { display:flex; align-items:center; justify-content:center; gap:4px; }
  .dot { width:5px; height:5px; background:rgba(255,255,255,0.4); border-radius:50%; animation:bounce 1.5s infinite; }
  .dot:nth-child(2) { animation-delay:0.15s; }
  .dot:nth-child(3) { animation-delay:0.3s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-4px); } }
  .input-bar { padding:8px 12px; display:flex; gap:10px; background:var(--bg); border-top:0.5px solid rgba(255,255,255,0.08); flex-shrink:0; }
  .input-wrapper { flex:1; background:#1c1c1e; border-radius:20px; padding:0 12px; display:flex; align-items:center; }
  .input-wrapper input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:16px; padding:8px 0; }
  .input-wrapper input::placeholder { color:var(--sub); }
  .send-btn { background:#0A84FF; border:none; border-radius:50%; width:36px; height:36px; color:#fff; font-size:18px; cursor:pointer; }
  .send-btn:disabled { opacity:0.4; }
  .error { color:#ff453a; font-size:12px; text-align:center; display:none; padding:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <div style="width:40px;"></div>
    <div class="nav-center">
      <div class="avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
      <div class="name-pill">王熠</div>
    </div>
    <div style="width:40px;"></div>
  </div>
  <div class="chat" id="chat">
    <div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div id="anchor" style="height:1px;"></div>
  </div>
  <div id="error" class="error">⚠️ 请求失败，稍后重试</div>
  <div class="input-bar">
    <div class="input-wrapper"><input type="text" id="input" placeholder="iMessage 信息" /></div>
    <button class="send-btn" id="send" disabled>↑</button>
  </div>
</div>
<script>
  const chat=document.getElementById('chat'), input=document.getElementById('input'), send=document.getElementById('send'), typing=document.getElementById('typing'), anchor=document.getElementById('anchor'), error=document.getElementById('error');
  let hist=[], wait=false;
  function scroll(){ anchor.scrollIntoView({behavior:'smooth'}); }
  function time(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
  function addMsg(text, who, t){ const d=document.createElement('div'); d.className='message '+who; const b=document.createElement('div'); b.className='bubble'; b.textContent=text; d.appendChild(b); const tag=document.createElement('div'); tag.className='time-tag'; tag.textContent=t||time(); d.appendChild(tag); chat.insertBefore(d, typing); scroll(); }
  async function sendMsg(){ const text=input.value.trim(); if(!text||wait)return; addMsg(text,'me'); hist.push({role:'user',content:text}); input.value=''; send.disabled=true; wait=true; typing.classList.add('show'); scroll(); error.style.display='none'; try{ const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist})}); if(!r.ok)throw new Error('请求失败'); const data=await r.json(); typing.classList.remove('show'); addMsg(data.reply,'other'); hist.push({role:'assistant',content:data.reply}); if(hist.length>20)hist=hist.slice(-20); }catch(e){ typing.classList.remove('show'); error.style.display='block'; error.textContent='⚠️ '+e.message; }finally{ wait=false; send.disabled=input.value.trim()===''; input.focus(); } }
  input.addEventListener('input',()=>{ send.disabled=input.value.trim()===''||wait; });
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); sendMsg();} });
  send.addEventListener('click',sendMsg);
  chat.addEventListener('click',()=>input.focus());
  setTimeout(()=>{ addMsg('小狗？叫谁呢？','other'); hist.push({role:'assistant',content:'小狗？叫谁呢？'}); },600);
</script>
</body>
</html>
